; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
; JSON handling now uses ArduinoJson v7's JsonDocument API directly.
; This library is required for compilation and provides the JsonDocument class.
lib_deps = bblanchon/ArduinoJson@^7.0.4

; Partition scheme: huge_app gives ~3MB for program (no OTA)
board_build.partitions = huge_app.csv

; Optimize for size to reduce flash usage
build_flags = 
    -Os                          ; Optimize for size
    -DCORE_DEBUG_LEVEL=0         ; Disable debug logging

; Baud rates
monitor_speed = 115200
upload_speed = 115200